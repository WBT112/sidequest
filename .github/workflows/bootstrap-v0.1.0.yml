name: Bootstrap v0.1.0 Release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-v0.1.0.yml

permissions:
  contents: write

concurrency:
  group: bootstrap-v0.1.0
  cancel-in-progress: false

jobs:
  release:
    name: Test and publish v0.1.0
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RELEASE_TAG: v0.1.0
      TARGET_SHA: 3c27e34a6252ba5fb3173e94dff60b9449ac8e2b

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out release target and prepare local tag
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "$TARGET_SHA"
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$TARGET_SHA"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" -m "Sidequest $RELEASE_TAG" "$TARGET_SHA"
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run project QA
        run: ./scripts/qa.sh

      - name: Build release artifacts without publishing
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test archive installer against built artifacts
        run: ./scripts/release-artifact-qa.sh dist

      - name: Test amd64 DEB package in Ubuntu
        run: |
          docker run --rm -v "$PWD/dist:/dist" ubuntu:24.04 sh -euxc '
            apt-get update
            apt-get install -y ca-certificates tmux
            deb_package="$(find /dist -maxdepth 1 -name "sidequest_*_linux_amd64.deb" -print -quit)"
            test -n "$deb_package"
            apt-get install -y "$deb_package"
            sidequest --version | grep "sidequest 0.1.0"
            sidequest --help >/dev/null
            dpkg -L sidequest | grep /usr/bin/sidequest
            apt-get remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Test amd64 RPM package in Fedora
        run: |
          docker run --rm -v "$PWD/dist:/dist" fedora:latest sh -euxc '
            rpm_package="$(find /dist -maxdepth 1 -name "sidequest_*_linux_amd64.rpm" -print -quit)"
            test -n "$rpm_package"
            dnf install -y ca-certificates tmux "$rpm_package"
            sidequest --version | grep "sidequest 0.1.0"
            sidequest --help >/dev/null
            rpm -ql sidequest | grep /usr/bin/sidequest
            dnf remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Push release tag
        shell: bash
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$TARGET_SHA"
          else
            git push origin "refs/tags/$RELEASE_TAG"
          fi

      - name: Publish GitHub Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
