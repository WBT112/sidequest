name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, test, and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run project QA
        run: ./scripts/qa.sh

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like v0.1.0" >&2; exit 1 ;;
          esac

      - name: Build release artifacts without publishing
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test archive installer against built artifacts
        run: ./scripts/release-artifact-qa.sh dist

      - name: Test DEB package in Ubuntu
        run: |
          docker run --rm -v "$PWD/dist:/dist" ubuntu:24.04 sh -euxc '
            apt-get update
            apt-get install -y ca-certificates tmux
            apt-get install -y /dist/*.deb
            sidequest --version
            sidequest --help >/dev/null
            dpkg -L sidequest | grep /usr/bin/sidequest
            apt-get remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Test RPM package in Fedora
        run: |
          docker run --rm -v "$PWD/dist:/dist" fedora:latest sh -euxc '
            dnf install -y ca-certificates tmux /dist/*.rpm
            sidequest --version
            sidequest --help >/dev/null
            rpm -ql sidequest | grep /usr/bin/sidequest
            dnf remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
