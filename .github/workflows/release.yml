name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, test, and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: go.sum

      - name: Run project QA
        run: ./scripts/qa.sh

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like v0.1.0" >&2; exit 1 ;;
          esac

      - name: Build release artifacts without publishing
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test archive installer against built artifacts
        run: ./scripts/release-artifact-qa.sh dist

      - name: Test amd64 DEB package in Ubuntu
        run: |
          deb_package="$(find "$PWD/dist" -maxdepth 1 -name 'sidequest_*_linux_amd64.deb' -print -quit)"
          test -n "$deb_package"
          docker run --rm -v "$PWD/dist:/dist" ubuntu:24.04 sh -euxc '
            apt-get update
            apt-get install -y ca-certificates tmux
            deb_package="$(find /dist -maxdepth 1 -name "sidequest_*_linux_amd64.deb" -print -quit)"
            test -n "$deb_package"
            apt-get install -y "$deb_package"
            sidequest --version
            sidequest --help >/dev/null
            dpkg -L sidequest | grep /usr/bin/sidequest
            apt-get remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Test amd64 RPM package in Fedora
        run: |
          rpm_package="$(find "$PWD/dist" -maxdepth 1 -name 'sidequest_*_linux_amd64.rpm' -print -quit)"
          test -n "$rpm_package"
          docker run --rm -v "$PWD/dist:/dist" fedora:latest sh -euxc '
            rpm_package="$(find /dist -maxdepth 1 -name "sidequest_*_linux_amd64.rpm" -print -quit)"
            test -n "$rpm_package"
            dnf install -y ca-certificates tmux "$rpm_package"
            sidequest --version
            sidequest --help >/dev/null
            rpm -ql sidequest | grep /usr/bin/sidequest
            dnf remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@v4
        with:
          subject-checksums: ./dist/checksums.txt
