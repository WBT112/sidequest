name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    name: Build and test release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: go.sum

      - name: Run project QA
        run: ./scripts/qa.sh

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like v0.1.0" >&2; exit 1 ;;
          esac

      - name: Build release artifacts without publishing
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tested release asset set
        run: |
          set -eu
          cp install.sh dist/install.sh
          ./scripts/release-asset-list.sh dist > dist/release-assets.txt
          test -s dist/release-assets.txt
          while IFS= read -r asset; do
            sha256sum "$asset"
          done < dist/release-assets.txt > dist/release-assets.sha256

      - name: Test archive installer against built artifacts
        run: ./scripts/release-artifact-qa.sh dist

      - name: Test amd64 DEB package in Ubuntu
        run: |
          deb_package="$(find "$PWD/dist" -maxdepth 1 -name 'sidequest_*_linux_amd64.deb' -print -quit)"
          test -n "$deb_package"
          docker run --rm -v "$PWD/dist:/dist" ubuntu:24.04 sh -euxc '
            apt-get update
            apt-get install -y ca-certificates tmux
            deb_package="$(find /dist -maxdepth 1 -name "sidequest_*_linux_amd64.deb" -print -quit)"
            test -n "$deb_package"
            apt-get install -y "$deb_package"
            sidequest --version
            sidequest --help >/dev/null
            dpkg -L sidequest | grep /usr/bin/sidequest
            apt-get remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Test amd64 RPM package in Fedora
        run: |
          rpm_package="$(find "$PWD/dist" -maxdepth 1 -name 'sidequest_*_linux_amd64.rpm' -print -quit)"
          test -n "$rpm_package"
          docker run --rm -v "$PWD/dist:/dist" fedora:latest sh -euxc '
            rpm_package="$(find /dist -maxdepth 1 -name "sidequest_*_linux_amd64.rpm" -print -quit)"
            test -n "$rpm_package"
            dnf install -y ca-certificates tmux "$rpm_package"
            sidequest --version
            sidequest --help >/dev/null
            rpm -ql sidequest | grep /usr/bin/sidequest
            dnf remove -y sidequest
            test ! -e /usr/bin/sidequest
          '

      - name: Verify release artifact hashes before publication
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sha256sum -c dist/release-assets.sha256
          (cd dist && sha256sum -c checksums.txt)

      - name: Upload tested release artifact set
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tested-release-dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish tested release artifacts
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download tested release artifact set
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tested-release-dist
          path: dist

      - name: Verify downloaded release artifact hashes
        run: |
          sha256sum -c dist/release-assets.sha256
          (cd dist && sha256sum -c checksums.txt)

      - name: Publish tested GitHub Release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < dist/release-assets.txt
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Attest release artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: ./dist/checksums.txt
