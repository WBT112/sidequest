name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Go QA
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run project QA
        run: ./scripts/qa.sh

      - name: Verify formatting produced no changes
        run: git diff --exit-code -- .

  install-qa:
    name: Install QA (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:24.04
          - debian:stable-slim
          - fedora:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run installer QA in disposable container
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            "${{ matrix.image }}" \
            sh scripts/install-qa.sh
